<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Outer diamond -->
  <polygon points="50,4 96,50 50,96 4,50"
    fill="none" stroke="rgba(245,237,214,0.13)" stroke-width="1.3"/>
  <!-- Mid diamond -->
  <polygon points="50,18 82,50 50,82 18,50"
    fill="none" stroke="rgba(240,90,26,0.09)" stroke-width="0.9"/>
  <!-- Inner diamond -->
  <polygon points="50,34 66,50 50,66 34,50"
    fill="none" stroke="rgba(245,237,214,0.07)" stroke-width="0.7"/>
  <!-- Diamond corner dots -->
  <circle cx="50" cy="4"  r="1.8" fill="rgba(245,237,214,0.16)"/>
  <circle cx="96" cy="50" r="1.8" fill="rgba(245,237,214,0.16)"/>
  <circle cx="50" cy="96" r="1.8" fill="rgba(245,237,214,0.16)"/>
  <circle cx="4"  cy="50" r="1.8" fill="rgba(245,237,214,0.16)"/>
  <!-- Mid diamond corner dots -->
  <circle cx="50" cy="18" r="1.3" fill="rgba(240,90,26,0.14)"/>
  <circle cx="82" cy="50" r="1.3" fill="rgba(240,90,26,0.14)"/>
  <circle cx="50" cy="82" r="1.3" fill="rgba(240,90,26,0.14)"/>
  <circle cx="18" cy="50" r="1.3" fill="rgba(240,90,26,0.14)"/>
  <!-- Centre dot -->
  <circle cx="50" cy="50" r="2.2" fill="rgba(240,90,26,0.16)"/>
  <circle cx="50" cy="50" r="0.9" fill="rgba(245,237,214,0.20)"/>
  <!-- Corner tile-join dots (appear where 4 tiles meet) -->
  <circle cx="0"   cy="0"   r="1.8" fill="rgba(245,237,214,0.14)"/>
  <circle cx="100" cy="0"   r="1.8" fill="rgba(245,237,214,0.14)"/>
  <circle cx="0"   cy="100" r="1.8" fill="rgba(245,237,214,0.14)"/>
  <circle cx="100" cy="100" r="1.8" fill="rgba(245,237,214,0.14)"/>
</svg>
